name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4

      - name: Check for code changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'eslint.config.*'
              - 'index.html'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.code == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.changes.outputs.code == 'true'

      - name: Lint
        if: steps.changes.outputs.code == 'true'
        run: npm run lint

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: npm run build

      - name: Test
        if: steps.changes.outputs.code == 'true'
        run: npm test

      - name: Skip (no code changes)
        if: steps.changes.outputs.code == 'false'
        run: echo "No code changes detected — skipping lint/build/test"
